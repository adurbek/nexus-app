<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#f0ede8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
    body{margin:0;background:#f0ede8;overscroll-behavior:none}
    #root{height:100%}
  </style>
  <script>
    // Block DevTools on DESKTOP only (not mobile)
    (function(){
      var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      if (isMobile) return; // Don't block mobile browsers
      document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
      document.addEventListener('keydown', function(e){
        if(e.key==='F12' ||
          (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
          (e.ctrlKey && ['u','U'].includes(e.key))) {
          e.preventDefault(); return false;
        }
      }, true);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
